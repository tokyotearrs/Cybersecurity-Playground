services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyber-playground-web
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: cyber_playground
      DB_USER: playground_user
      DB_PASSWORD: playground_pass
    volumes:
      - ./app:/var/www/html

  db:
    image: mysql:8.0
    container_name: cyber-playground-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: cyber_playground
      MYSQL_USER: playground_user
      MYSQL_PASSWORD: playground_pass
      MYSQL_ROOT_PASSWORD: root_pass
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  db_data:
